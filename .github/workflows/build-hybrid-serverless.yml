# ======================================================================================
# FINAL, STABLE - OpenWrt Package Builder - Based on your original, working SDK method.
#
# This workflow returns to your proven SDK-based build method.
# The only major change is splitting the final matrix into 4 parts to avoid GitHub's limit.
# All other complexities have been removed.
# ======================================================================================

name: Build and Deploy OpenWrt Packages (Original SDK Method)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC
  push:
    paths:
      - 'cur_ver.json'

jobs:
  # Job 1: Your original, working matrix generation.
  generate_matrix:
    name: Generate Matrix for ${{ matrix.ref }}
    runs-on: ubuntu-latest
    outputs:
      sdks: ${{ steps.out.outputs.sdks }}
    strategy:
      fail-fast: false
      matrix:
        ref:
          - 'main'
          - 'openwrt-24.10'
          - 'openwrt-23.05'
          - 'openwrt-22.03'
          - 'openwrt-21.02'
    steps:
      - name: Checkout OpenWrt SDK source to find architectures
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: ${{ matrix.ref }}
      - name: Set SDK targets
        id: find_targets
        run: |
          REF=${{ matrix.ref }}
          JSON='['
          FIRST=1
          while read -r line; do
            [ -z "$line" ] && continue
            ARCH=$(echo "$line" | cut -d " " -f 1)
            [[ $FIRST -ne 1 ]] && JSON="$JSON"','
            FIRST=0
            JSON="$JSON"'{"arch":"'"$ARCH"'","ref":"'"$REF"'"}'
          done <<< $(perl ./scripts/dump-target-info.pl architectures 2>/dev/null)
          JSON="$JSON"']'
          echo "sdks=$JSON" >> "$GITHUB_OUTPUT"
      - name: Store matrix output
        uses: cloudposse/github-action-matrix-outputs-write@main
        id: out
        with:
          matrix-step-name: ${{ github.job }}
          matrix-key: ${{ matrix.ref }}
          outputs: |-
            sdks: ${{ steps.find_targets.outputs.sdks }}

  # Job 2: Your original, working gathering job.
  gather_matrix:
    name: Gather Build Matrices
    runs-on: ubuntu-latest
    needs: generate_matrix
    outputs:
      result: ${{ steps.gather.outputs.result }}
    steps:
      - name: Read all matrix outputs
        uses: cloudposse/github-action-matrix-outputs-read@main
        id: read
        with:
          matrix-step-name: generate_matrix
      - name: Gather matrices into a single list
        id: gather
        run: |
          # Your original, working jq command
          result=$(jq -c '.sdks[]' <<< '${{ steps.read.outputs.result }}' | jq -c -s add)
          echo "result=${result}" >> $GITHUB_OUTPUT

  # Job 3: The ONLY new part - Split the gathered list into 4.
  split_matrix:
    name: Split Build Matrix
    runs-on: ubuntu-latest
    needs: gather_matrix
    outputs:
      matrix_part1: ${{ steps.split.outputs.matrix_part1 }}
      matrix_part2: ${{ steps.split.outputs.matrix_part2 }}
      matrix_part3: ${{ steps.split.outputs.matrix_part3 }}
      matrix_part4: ${{ steps.split.outputs.matrix_part4 }}
    steps:
      - name: Split Matrix
        id: split
        run: |
          COMBINED_MATRIX='${{ needs.gather_matrix.outputs.result }}'
          TOTAL_JOBS=$(echo "$COMBINED_MATRIX" | jq 'length')
          P1=$((TOTAL_JOBS / 4)); P2=$((P1 * 2)); P3=$((P1 * 3))
          echo "Total jobs found: $TOTAL_JOBS"
          echo "matrix_part1=$(echo "$COMBINED_MATRIX" | jq -c ".[0:${P1}]")" >> $GITHUB_OUTPUT
          echo "matrix_part2=$(echo "$COMBINED_MATRIX" | jq -c ".[${P1}:${P2}]")" >> $GITHUB_OUTPUT
          echo "matrix_part3=$(echo "$COMBINED_MATRIX" | jq -c ".[${P2}:${P3}]")" >> $GITHUB_OUTPUT
          echo "matrix_part4=$(echo "$COMBINED_MATRIX" | jq -c ".[${P3}:]")" >> $GITHUB_OUTPUT

  # Job 4: The build jobs, now split into 4 parallel runs.
  build_part1:
    name: Build Part 1 (${{ strategy.job-index }}/${{ strategy.job-total }})
    needs: split_matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.split_matrix.outputs.matrix_part1) }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y python3-pip jq && pip3 install nvchecker
      - id: ver
        run: |
          if [ ! -f cur_ver.json ]; then echo "{}" > cur_ver.json; fi
          jq -cr 'map("\(.name)=\(.newver)") | .[]' <<< $(nvcmp -c nvchecker.toml -aj) >> $GITHUB_OUTPUT
      - run: |
          mkdir -p package
          git clone --depth 1 https://github.com/peditx/luci-app-themeswitch.git package/luci-app-themeswitch
          git clone --depth 1 https://github.com/peditx/luci-theme-peditx.git package/luci-theme-peditx
          git clone --depth 1 https://github.com/peditx/luci-theme-carbonpx.git package/luci-theme-carbonpx
      - name: Override Go and Rust toolchains to latest
        run: |
          echo "GOLANG_COMMIT=master" >> $GITHUB_ENV
          echo "RUST_COMMIT=master" >> $GITHUB_ENV
      - uses: moetayuko/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.ref }}
          EXTRA_FEEDS: |
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages' || format('src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages^{0}', steps.ver.outputs.packages) }}
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall_luci|https://github.com/peditx/openwrt-passwall' || format('src-git|passwall_luci|https://github.com/peditx/openwrt-passwall^{0}', steps.ver.outputs.passwall) }}
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall2|https://github.com/peditx/openwrt-passwall2' || format('src-git|passwall2|https://github.com/peditx/openwrt-passwall2^{0}', steps.ver.outputs.passwall2) }}
          KEY_BUILD: ${{ secrets.SIGN_PRIV_KEY }}
          IGNORE_ERRORS: n m y
      - run: |
          mkdir -p "dist/${{ matrix.ref }}/${{ matrix.arch }}"
          find bin/packages/${{ matrix.arch }} -type f -name "*.ipk" -exec cp -t "dist/${{ matrix.ref }}/${{ matrix.arch }}/" {} +
          find bin/packages/${{ matrix.arch }} -name "Packages*" -exec cp -t "dist/${{ matrix.ref }}/${{ matrix.arch }}/" {} +
          if [ -f "key-build.pub" ]; then cp key-build.pub "dist/"; fi
      - uses: actions/upload-artifact@v4
        with: { name: packages-part1, path: dist }

  build_part2:
    name: Build Part 2 (${{ strategy.job-index }}/${{ strategy.job-total }})
    needs: split_matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.split_matrix.outputs.matrix_part2) }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y python3-pip jq && pip3 install nvchecker
      - id: ver
        run: |
          if [ ! -f cur_ver.json ]; then echo "{}" > cur_ver.json; fi
          jq -cr 'map("\(.name)=\(.newver)") | .[]' <<< $(nvcmp -c nvchecker.toml -aj) >> $GITHUB_OUTPUT
      - run: |
          mkdir -p package
          git clone --depth 1 https://github.com/peditx/luci-app-themeswitch.git package/luci-app-themeswitch
          git clone --depth 1 https://github.com/peditx/luci-theme-peditx.git package/luci-theme-peditx
          git clone --depth 1 https://github.com/peditx/luci-theme-carbonpx.git package/luci-theme-carbonpx
      - name: Override Go and Rust toolchains to latest
        run: |
          echo "GOLANG_COMMIT=master" >> $GITHUB_ENV
          echo "RUST_COMMIT=master" >> $GITHUB_ENV
      - uses: moetayuko/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.ref }}
          EXTRA_FEEDS: |
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages' || format('src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages^{0}', steps.ver.outputs.packages) }}
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall_luci|https://github.com/peditx/openwrt-passwall' || format('src-git|passwall_luci|https://github.com/peditx/openwrt-passwall^{0}', steps.ver.outputs.passwall) }}
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall2|https://github.com/peditx/openwrt-passwall2' || format('src-git|passwall2|https://github.com/peditx/openwrt-passwall2^{0}', steps.ver.outputs.passwall2) }}
          KEY_BUILD: ${{ secrets.SIGN_PRIV_KEY }}
          IGNORE_ERRORS: n m y
      - run: |
          mkdir -p "dist/${{ matrix.ref }}/${{ matrix.arch }}"
          find bin/packages/${{ matrix.arch }} -type f -name "*.ipk" -exec cp -t "dist/${{ matrix.ref }}/${{ matrix.arch }}/" {} +
          find bin/packages/${{ matrix.arch }} -name "Packages*" -exec cp -t "dist/${{ matrix.ref }}/${{ matrix.arch }}/" {} +
          if [ -f "key-build.pub" ]; then cp key-build.pub "dist/"; fi
      - uses: actions/upload-artifact@v4
        with: { name: packages-part2, path: dist }

  build_part3:
    name: Build Part 3 (${{ strategy.job-index }}/${{ strategy.job-total }})
    needs: split_matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.split_matrix.outputs.matrix_part3) }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y python3-pip jq && pip3 install nvchecker
      - id: ver
        run: |
          if [ ! -f cur_ver.json ]; then echo "{}" > cur_ver.json; fi
          jq -cr 'map("\(.name)=\(.newver)") | .[]' <<< $(nvcmp -c nvchecker.toml -aj) >> $GITHUB_OUTPUT
      - run: |
          mkdir -p package
          git clone --depth 1 https://github.com/peditx/luci-app-themeswitch.git package/luci-app-themeswitch
          git clone --depth 1 https://github.com/peditx/luci-theme-peditx.git package/luci-theme-peditx
          git clone --depth 1 https://github.com/peditx/luci-theme-carbonpx.git package/luci-theme-carbonpx
      - name: Override Go and Rust toolchains to latest
        run: |
          echo "GOLANG_COMMIT=master" >> $GITHUB_ENV
          echo "RUST_COMMIT=master" >> $GITHUB_ENV
      - uses: moetayuko/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.ref }}
          EXTRA_FEEDS: |
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages' || format('src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages^{0}', steps.ver.outputs.packages) }}
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall_luci|https://github.com/peditx/openwrt-passwall' || format('src-git|passwall_luci|https://github.com/peditx/openwrt-passwall^{0}', steps.ver.outputs.passwall) }}
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall2|https://github.com/peditx/openwrt-passwall2' || format('src-git|passwall2|https://github.com/peditx/openwrt-passwall2^{0}', steps.ver.outputs.passwall2) }}
          KEY_BUILD: ${{ secrets.SIGN_PRIV_KEY }}
          IGNORE_ERRORS: n m y
      - run: |
          mkdir -p "dist/${{ matrix.ref }}/${{ matrix.arch }}"
          find bin/packages/${{ matrix.arch }} -type f -name "*.ipk" -exec cp -t "dist/${{ matrix.ref }}/${{ matrix.arch }}/" {} +
          find bin/packages/${{ matrix.arch }} -name "Packages*" -exec cp -t "dist/${{ matrix.ref }}/${{ matrix.arch }}/" {} +
          if [ -f "key-build.pub" ]; then cp key-build.pub "dist/"; fi
      - uses: actions/upload-artifact@v4
        with: { name: packages-part3, path: dist }

  build_part4:
    name: Build Part 4 (${{ strategy.job-index }}/${{ strategy.job-total }})
    needs: split_matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.split_matrix.outputs.matrix_part4) }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y python3-pip jq && pip3 install nvchecker
      - id: ver
        run: |
          if [ ! -f cur_ver.json ]; then echo "{}" > cur_ver.json; fi
          jq -cr 'map("\(.name)=\(.newver)") | .[]' <<< $(nvcmp -c nvchecker.toml -aj) >> $GITHUB_OUTPUT
      - run: |
          mkdir -p package
          git clone --depth 1 https://github.com/peditx/luci-app-themeswitch.git package/luci-app-themeswitch
          git clone --depth 1 https://github.com/peditx/luci-theme-peditx.git package/luci-theme-peditx
          git clone --depth 1 https://github.com/peditx/luci-theme-carbonpx.git package/luci-theme-carbonpx
      - name: Override Go and Rust toolchains to latest
        run: |
          echo "GOLANG_COMMIT=master" >> $GITHUB_ENV
          echo "RUST_COMMIT=master" >> $GITHUB_ENV
      - uses: moetayuko/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.ref }}
          EXTRA_FEEDS: |
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages' || format('src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages^{0}', steps.ver.outputs.packages) }}
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall_luci|https://github.com/peditx/openwrt-passwall' || format('src-git|passwall_luci|https://github.com/peditx/openwrt-passwall^{0}', steps.ver.outputs.passwall) }}
            ${{ contains(fromJSON('["openwrt-22.03", "openwrt-21.02"]'), matrix.ref) && 'src-git|passwall2|https://github.com/peditx/openwrt-passwall2' || format('src-git|passwall2|https://github.com/peditx/openwrt-passwall2^{0}', steps.ver.outputs.passwall2) }}
          KEY_BUILD: ${{ secrets.SIGN_PRIV_KEY }}
          IGNORE_ERRORS: n m y
      - run: |
          mkdir -p "dist/${{ matrix.ref }}/${{ matrix.arch }}"
          find bin/packages/${{ matrix.arch }} -type f -name "*.ipk" -exec cp -t "dist/${{ matrix.ref }}/${{ matrix.arch }}/" {} +
          find bin/packages/${{ matrix.arch }} -name "Packages*" -exec cp -t "dist/${{ matrix.ref }}/${{ matrix.arch }}/" {} +
          if [ -f "key-build.pub" ]; then cp key-build.pub "dist/"; fi
      - uses: actions/upload-artifact@v4
        with: { name: packages-part4, path: dist }

  # Job 5: The final deployment job
  deploy:
    needs: [build_part1, build_part2, build_part3, build_part4]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./dist
          pattern: packages-part*
          merge-multiple: true
      - uses: actions/checkout@v4
      - name: Create repository index pages
        run: |
          if [ -d "fav" ]; then cp -r fav ./dist/; fi
          find ./dist -type d -exec bash -c '
            cd "$0"
            cat > index.html << EOL
          <!DOCTYPE html><html><head><title>Index of $(pwd)</title>
          <style>body { background-color: #0a0a14; color: #e0e0e0; font-family: monospace; padding: 2em; } a { color: #00f6ff; text-decoration: none; } a:hover { text-decoration: underline; }</style>
          </head><body><h1>Index of $(pwd | sed "s|/home/runner/work/peditxos-repo/peditxos-repo/dist||")</h1><hr><pre><a href="../">../</a>
          EOL
            for item in *; do
              if [ "$item" != "index.html" ]; then
                if [ -d "$item" ]; then echo "<a href=\"$item/\">$item/</a>" >> index.html;
                else echo "<a href=\"$item\">$item</a>" >> index.html; fi
              fi
            done
            echo "</pre><hr></body></html>" >> index.html
          ' {} \;
          PUB_KEY_PATH=$(find ./dist -name 'key-build.pub' | head -n 1)
          if [ -n "$PUB_KEY_PATH" ]; then cp "$PUB_KEY_PATH" ./dist/key-build.pub; fi
          cd ./dist
          BROWSE_HTML=""
          for dir in $(find . -maxdepth 1 -type d -not -name '.*' -not -name '.' -not -name 'fav' | sort -rV); do
            version_name=$(basename "$dir")
            BROWSE_HTML="${BROWSE_HTML}<li><a href=\"./${version_name}/\" class=\"text-neon-cyan hover:underline\">${version_name}</a></li>"
          done
          cd ..
          if [ -f "index.html" ]; then
            cp index.html ./dist/
            sed -i 's|<!-- Links will be dynamically inserted here by the build workflow -->|'"$BROWSE_HTML"'|' ./dist/index.html
          fi
      - uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: peditx/PeDitXOS-Repository
          publish_dir: ./dist
          publish_branch: repo
          force_orphan: true
          cname: downloads.peditxos.ir
          user_name: 'peditworker'
          user_email: 'pedram.ale@me.com'

