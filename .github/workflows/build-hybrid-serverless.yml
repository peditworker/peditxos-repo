          git clone --depth 1 https://github.com/peditx/luci-app-themeswitch.git package/luci-app-themeswitch
          git clone --depth 1 https://github.com/peditx/luci-theme-peditx.git package/luci-theme-peditx
          git clone --depth 1 https://github.com/peditx/luci-theme-carbonpx.git package/luci-theme-carbonpx
      - name: Build Packages
        uses: moetayuko/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.ref }}
          EXTRA_FEEDS: |
            ${{ matrix.ref == 'openwrt-22.03' && 'src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages' || format('src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages^{0}', steps.ver.outputs.packages) }}
            ${{ matrix.ref == 'openwrt-22.03' && 'src-git|passwall_luci|https://github.com/peditx/openwrt-passwall' || format('src-git|passwall_luci|https://github.com/peditx/openwrt-passwall^{0}', steps.ver.outputs.passwall) }}
            ${{ matrix.ref == 'openwrt-22.03' && 'src-git|passwall2|https://github.com/peditx/openwrt-passwall2' || format('src-git|passwall2|https://github.com/peditx/openwrt-passwall2^{0}', steps.ver.outputs.passwall2) }}
          KEY_BUILD: ${{ secrets.SIGN_PRIV_KEY }}
          IGNORE_ERRORS: n m y
      - name: Organize packages for artifact upload
        run: |
          mkdir -p "dist/${{ matrix.ref }}/${{ matrix.arch }}/packages"
          find bin/packages/${{ matrix.arch }} -type f -name "*.ipk" -exec cp {} "dist/${{ matrix.ref }}/${{ matrix.arch }}/packages/" \;
          find bin/packages/${{ matrix.arch }} -name "Packages*" -exec cp {} "dist/${{ matrix.ref }}/${{ matrix.arch }}/" \;
          if [ -f "key-build.pub" ]; then cp key-build.pub "dist/"; fi
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: packages-part2-${{ matrix.ref }}-${{ matrix.arch }}
          path: dist
          retention-days: 1

  # Job 3, Part 3: Build the third quarter of the matrix
  build_part3:
    name: Build Part 3 - ${{ matrix.arch }} for ${{ matrix.ref }}
    runs-on: ubuntu-latest
    needs: split_matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.split_matrix.outputs.matrix_part3) }}
    steps:
      - name: Checkout main repository code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-pip jq && pip3 install nvchecker
      - name: Retrieve Latest Versions
        id: ver
        run: |
          if [ ! -f cur_ver.json ]; then echo "{}" > cur_ver.json; fi
          vers=$(nvcmp -c nvchecker.toml -aj)
          jq -cr 'map("\(.name)=\(.newver)") | .[]' <<< $vers >> $GITHUB_OUTPUT
      - name: Manually clone theme packages
        run: |
          mkdir -p package
          git clone --depth 1 https://github.com/peditx/luci-app-themeswitch.git package/luci-app-themeswitch
          git clone --depth 1 https://github.com/peditx/luci-theme-peditx.git package/luci-theme-peditx
          git clone --depth 1 https://github.com/peditx/luci-theme-carbonpx.git package/luci-theme-carbonpx
      - name: Build Packages
        uses: moetayuko/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.ref }}
          EXTRA_FEEDS: |
            ${{ matrix.ref == 'openwrt-22.03' && 'src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages' || format('src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages^{0}', steps.ver.outputs.packages) }}
            ${{ matrix.ref == 'openwrt-22.03' && 'src-git|passwall_luci|https://github.com/peditx/openwrt-passwall' || format('src-git|passwall_luci|https://github.com/peditx/openwrt-passwall^{0}', steps.ver.outputs.passwall) }}
            ${{ matrix.ref == 'openwrt-22.03' && 'src-git|passwall2|https://github.com/peditx/openwrt-passwall2' || format('src-git|passwall2|https://github.com/peditx/openwrt-passwall2^{0}', steps.ver.outputs.passwall2) }}
          KEY_BUILD: ${{ secrets.SIGN_PRIV_KEY }}
          IGNORE_ERRORS: n m y
      - name: Organize packages for artifact upload
        run: |
          mkdir -p "dist/${{ matrix.ref }}/${{ matrix.arch }}/packages"
          find bin/packages/${{ matrix.arch }} -type f -name "*.ipk" -exec cp {} "dist/${{ matrix.ref }}/${{ matrix.arch }}/packages/" \;
          find bin/packages/${{ matrix.arch }} -name "Packages*" -exec cp {} "dist/${{ matrix.ref }}/${{ matrix.arch }}/" \;
          if [ -f "key-build.pub" ]; then cp key-build.pub "dist/"; fi
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: packages-part3-${{ matrix.ref }}-${{ matrix.arch }}
          path: dist
          retention-days: 1

  # Job 3, Part 4: Build the final quarter of the matrix
  build_part4:
    name: Build Part 4 - ${{ matrix.arch }} for ${{ matrix.ref }}
    runs-on: ubuntu-latest
    needs: split_matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.split_matrix.outputs.matrix_part4) }}
    steps:
      - name: Checkout main repository code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-pip jq && pip3 install nvchecker
      - name: Retrieve Latest Versions
        id: ver
        run: |
          if [ ! -f cur_ver.json ]; then echo "{}" > cur_ver.json; fi
          vers=$(nvcmp -c nvchecker.toml -aj)
          jq -cr 'map("\(.name)=\(.newver)") | .[]' <<< $vers >> $GITHUB_OUTPUT
      - name: Manually clone theme packages
        run: |
          mkdir -p package
          git clone --depth 1 https://github.com/peditx/luci-app-themeswitch.git package/luci-app-themeswitch
          git clone --depth 1 https://github.com/peditx/luci-theme-peditx.git package/luci-theme-peditx
          git clone --depth 1 https://github.com/peditx/luci-theme-carbonpx.git package/luci-theme-carbonpx
      - name: Build Packages
        uses: moetayuko/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.ref }}
          EXTRA_FEEDS: |
            ${{ matrix.ref == 'openwrt-22.03' && 'src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages' || format('src-git|passwall_packages|https://github.com/xiaorouji/openwrt-passwall-packages^{0}', steps.ver.outputs.packages) }}
            ${{ matrix.ref == 'openwrt-22.03' && 'src-git|passwall_luci|https://github.com/peditx/openwrt-passwall' || format('src-git|passwall_luci|https://github.com/peditx/openwrt-passwall^{0}', steps.ver.outputs.passwall) }}
            ${{ matrix.ref == 'openwrt-22.03' && 'src-git|passwall2|https://github.com/peditx/openwrt-passwall2' || format('src-git|passwall2|https://github.com/peditx/openwrt-passwall2^{0}', steps.ver.outputs.passwall2) }}
          KEY_BUILD: ${{ secrets.SIGN_PRIV_KEY }}
          IGNORE_ERRORS: n m y
      - name: Organize packages for artifact upload
        run: |
          mkdir -p "dist/${{ matrix.ref }}/${{ matrix.arch }}/packages"
          find bin/packages/${{ matrix.arch }} -type f -name "*.ipk" -exec cp {} "dist/${{ matrix.ref }}/${{ matrix.arch }}/packages/" \;
          find bin/packages/${{ matrix.arch }} -name "Packages*" -exec cp {} "dist/${{ matrix.ref }}/${{ matrix.arch }}/" \;
          if [ -f "key-build.pub" ]; then cp key-build.pub "dist/"; fi
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: packages-part4-${{ matrix.ref }}-${{ matrix.arch }}
          path: dist
          retention-days: 1

  # Job 4: The final deployment job
  deploy:
    needs: [build_part1, build_part2, build_part3, build_part4]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download all built packages
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          pattern: packages-part*
          merge-multiple: true
      - name: Create repository index pages
        run: |
          cd dist
          find . -type d -exec bash -c '
            cd "$0"
            echo "<!DOCTYPE html><html><head><title>Index of $(pwd)</title></head><body><h1>Index of $(pwd)</h1><hr><pre><a href=\"../\">../</a>" > index.html
            for item in *; do
              if [ "$item" != "index.html" ]; then
                if [ -d "$item" ]; then echo "<a href=\"$item/\">$item/</a>" >> index.html;
                else echo "<a href=\"$item\">$item</a>" >> index.html; fi
              fi
            done
            echo "</pre><hr></body></html>"
          ' {} \;
          echo '<!DOCTYPE html><html><head><title>PeDitXOS Repository</title><style>body{font-family: sans-serif; padding: 2em;}</style></head><body><h1>PeDitXOS Repository</h1><h2>Available OpenWrt Versions:</h2><ul>' > index.html
          for dir in $(find . -maxdepth 1 -type d -not -name '.*' -not -name '.' | sort); do
            version_name=$(basename "$dir")
            echo "<li><a href=\"$version_name/\">$version_name</a></li>" >> index.html
          done
          echo '</ul>' >> index.html
          find . -name 'key-build.pub' -print -exec cp {} ./key-build.pub \; -quit
          if [ -f "./key-build.pub" ]; then
            echo '<h3>Public Signing Key: <a href="key-build.pub">key-build.pub</a></h3>' >> index.html
          fi
          echo '</body></html>'
      - name: Push updates to repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: peditx/PeDitXOS-Repository
          publish_dir: ./dist
          publish_branch: repo
          force_orphan: true
          cname: downloads.peditxos.ir
          user_name: 'peditworker'
          user_email: 'pedram.ale@me.com'

