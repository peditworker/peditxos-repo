# ======================================================================================
# FINAL, STABLE - OpenWrt Package Repository Builder - "Download Once, Build Many" Architecture
#
# This workflow uses the correct, robust, multi-stage process to prevent DDoS errors:
#   1. SETUP: A single matrix job clones each OpenWrt version ONCE, adds all feeds,
#      and caches the entire prepared source tree.
#   2. BUILD: Hundreds of parallel jobs RESTORE the source from the cache instead of
#      re-cloning, preventing rate-limiting and dramatically speeding up the process.
# ======================================================================================

name: Build and Deploy Hybrid OpenWrt Packages (Serverless)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC
  push:
    paths:
      - 'cur_ver.json'

jobs:
  # Job 1: Setup a cached source tree for EACH OpenWrt version to avoid DDoS-like behavior.
  setup_source:
    name: Setup Source for OpenWrt ${{ matrix.ref }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ref:
          - 'main'
          - 'openwrt-24.10'
          - 'openwrt-23.05'
          - 'openwrt-22.03'
    steps:
      - name: Checkout main repository code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Read Package Versions from File
        id: ver
        run: |
          if [ ! -f cur_ver.json ]; then echo "{}" > cur_ver.json; fi
          jq -r 'keys[] as $k | "\($k)=\(.[$k].version)"' cur_ver.json >> $GITHUB_OUTPUT
      - name: Clone OpenWrt source code
        run: git clone --depth 1 --branch ${{ matrix.ref }} https://github.com/openwrt/openwrt.git openwrt
      - name: Clone custom single packages
        run: |
          git clone --depth 1 https://github.com/peditx/luci-app-themeswitch.git openwrt/package/luci-app-themeswitch
          git clone --depth 1 https://github.com/peditx/luci-theme-peditx.git openwrt/package/luci-theme-peditx
          git clone --depth 1 https://github.com/peditx/luci-theme-carbonpx.git openwrt/package/luci-theme-carbonpx
      
      # --- SPECIAL HANDLING FOR FEEDS ---
      - name: Update feeds for modern OpenWrt versions
        if: matrix.ref != 'openwrt-22.03'
        working-directory: ./openwrt
        run: |
          echo "Using latest dynamic package versions for modern OpenWrt..."
          cat >> feeds.conf.default << EOF
          src-git-full passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages ${{ steps.ver.outputs.packages }}
          src-git-full passwall_luci https://github.com/peditx/openwrt-passwall ${{ steps.ver.outputs.passwall }}
          src-git-full passwall2 https://github.com/peditx/openwrt-passwall2 ${{ steps.ver.outputs.passwall2 }}
          EOF
          ./scripts/feeds update -a

      - name: Update feeds for legacy OpenWrt 22.03
        if: matrix.ref == 'openwrt-22.03'
        working-directory: ./openwrt
        run: |
          echo "Using compatible package versions for OpenWrt 22.03..."
          cat >> feeds.conf.default << EOF
          src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages
          src-git passwall_luci https://github.com/peditx/openwrt-passwall
          src-git passwall2 https://github.com/peditx/openwrt-passwall2
          EOF
          ./scripts/feeds update -a

      - name: Cache the entire prepared OpenWrt source directory
        uses: actions/cache@v4
        with:
          path: openwrt
          key: src-v2-${{ matrix.ref }}-${{ hashFiles('cur_ver.json') }}

  # Job 2: Dynamically generate the build matrix for each version
  generate_matrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    needs: setup_source
    outputs:
      targets: ${{ steps.out.outputs.targets }}
    strategy:
      fail-fast: false
      matrix:
        ref:
          - 'main'
          - 'openwrt-24.10'
          - 'openwrt-23.05'
          - 'openwrt-22.03'
    steps:
      - name: Restore source from cache to find targets
        uses: actions/cache@v4
        with:
          path: openwrt
          key: src-v2-${{ matrix.ref }}-${{ hashFiles('cur_ver.json') }}
      - name: Set target/subtarget list
        id: find_targets
        working-directory: ./openwrt
        run: |
          REF=${{ matrix.ref }}
          JSON='['
          FIRST=1
          while read -r line; do
            [ -z "$line" ] && continue
            TARGET_PAIR=$(echo "$line" | sed 's/"/\\"/g')
            [[ $FIRST -ne 1 ]] && JSON="$JSON"','
            FIRST=0
            JSON="$JSON"'{"target_subtarget":"'"$TARGET_PAIR"'","openwrt_version":"'"$REF"'"}'
          done <<< $(perl ./scripts/dump-target-info.pl targets 2>/dev/null)
          JSON="$JSON"']'
          echo "targets=$JSON" >> "$GITHUB_OUTPUT"
      - name: Store matrix output
        uses: cloudposse/github-action-matrix-outputs-write@main
        id: out
        with:
          matrix-step-name: ${{ github.job }}
          matrix-key: ${{ matrix.ref }}
          outputs: |-
            targets: ${{ steps.find_targets.outputs.targets }}

  # Job 3: Gather and split the combined matrix into four parts
  split_matrix:
    name: Split Build Matrix
    runs-on: ubuntu-latest
    needs: generate_matrix
    outputs:
      matrix_part1: ${{ steps.split.outputs.matrix_part1 }}
      matrix_part2: ${{ steps.split.outputs.matrix_part2 }}
      matrix_part3: ${{ steps.split.outputs.matrix_part3 }}
      matrix_part4: ${{ steps.split.outputs.matrix_part4 }}
    steps:
      - name: Read all matrix outputs
        id: read
        uses: cloudposse/github-action-matrix-outputs-read@main
        with:
          matrix-step-name: generate_matrix
      - name: Combine and Split Matrix
        id: split
        run: |
          # This is the crucial fix: The new jq command correctly handles the complex nested JSON string structure.
          COMBINED_MATRIX=$(jq -c '[.[] | .outputs.targets | fromjson? // empty] | flatten' <<< '${{ steps.read.outputs.result }}')
          TOTAL_JOBS=$(echo "$COMBINED_MATRIX" | jq 'length')
          P1=$((TOTAL_JOBS / 4)); P2=$((P1 * 2)); P3=$((P1 * 3))
          echo "matrix_part1=$(echo "$COMBINED_MATRIX" | jq -c ".[0:${P1}]")" >> $GITHUB_OUTPUT
          echo "matrix_part2=$(echo "$COMBINED_MATRIX" | jq -c ".[${P1}:${P2}]")" >> $GITHUB_OUTPUT
          echo "matrix_part3=$(echo "$COMBINED_MATRIX" | jq -c ".[${P2}:${P3}]")" >> $GITHUB_OUTPUT
          echo "matrix_part4=$(echo "$COMBINED_MATRIX" | jq -c ".[${P3}:]")" >> $GITHUB_OUTPUT

  # Job 4, Part 1: Build the first quarter of the matrix
  build_part1:
    name: Build Part 1 - ${{ matrix.target_subtarget }} for ${{ matrix.openwrt_version }}
    runs-on: ubuntu-latest
    needs: split_matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.split_matrix.outputs.matrix_part1) }}
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v10
        with: { root-reserve-mb: 512, swap-size-mb: 1024, remove-dotnet: 'true', remove-android: 'true', remove-haskell: 'true' }
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y subversion libncurses-dev gawk zlib1g-dev python3-dev python3-setuptools unzip wget libtool python3-pip jq ninja-build
      - name: Restore entire OpenWrt source from cache
        uses: actions/cache@v4
        with:
          path: openwrt
          key: src-v2-${{ matrix.openwrt_version }}-${{ hashFiles('cur_ver.json') }}
      - name: Install feeds and generate config
        working-directory: ./openwrt
        run: |
          ./scripts/feeds install -f -p passwall_packages
          ./scripts/feeds install -f -p passwall_luci
          ./scripts/feeds install -f -p passwall2
          ./scripts/feeds install -f -p luci
          TARGET_MAIN=$(echo "${{ matrix.target_subtarget }}" | cut -d' ' -f1)
          TARGET=$(echo "$TARGET_MAIN" | cut -d'/' -f1)
          SUBTARGET=$(echo "$TARGET_MAIN" | cut -d'/' -f2)
          cat > .config << EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_ALL_MODULES=y
          CONFIG_PACKAGE_luci=y
          CONFIG_SIGNED_PACKAGES=y
          EOF
          make defconfig
      - name: Decode package signing key
        run: echo "${{ secrets.USIGN_PRIVATE_KEY }}" | base64 -d > openwrt/signing_key.pem && echo "CONFIG_SIGNATURE_KEY=\"signing_key.pem\"" >> openwrt/.config
      - name: Download all package sources
        working-directory: ./openwrt
        run: make download -j$(nproc) V=s
      - name: Build prerequisites (tools and toolchain)
        working-directory: ./openwrt
        run: |
          make tools/install -j$(nproc) V=s
          make toolchain/install -j$(nproc) V=s
      - name: Build all packages (non-stop)
        working-directory: ./openwrt
        run: |
          make package/compile -j$(nproc) V=s IGNORE_ERRORS=m
          make package/index V=s
      - name: Organize packages for artifact upload
        run: |
          TARGET_MAIN=$(echo "${{ matrix.target_subtarget }}" | cut -d' ' -f1)
          TARGET=$(echo "$TARGET_MAIN" | cut -d'/' -f1)
          SUBTARGET=$(echo "$TARGET_MAIN" | cut -d'/' -f2)
          ARTIFACT_DIR="dist/${{ matrix.openwrt_version }}/${TARGET}/${SUBTARGET}"
          mkdir -p "${ARTIFACT_DIR}/packages"
          find openwrt/bin/packages -type f -name "*.ipk" -exec cp {} "${ARTIFACT_DIR}/packages/" \;
          find openwrt/bin/targets -path "*${TARGET}/${SUBTARGET}*" -name "Packages*" -exec cp {} "${ARTIFACT_DIR}/" \;
          if [ -f "openwrt/key-build.pub" ]; then
            cp openwrt/key-build.pub "dist/key-build-${{ matrix.openwrt_version }}.pub"
          fi
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: packages-part1-${{ matrix.openwrt_version }}-${{ matrix.target_subtarget }}
          path: dist
          retention-days: 1

  # Job 4, Part 2: Build the second quarter of the matrix
  build_part2:
    name: Build Part 2 - ${{ matrix.target_subtarget }} for ${{ matrix.openwrt_version }}
    runs-on: ubuntu-latest
    needs: split_matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.split_matrix.outputs.matrix_part2) }}
    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@v10
        with: { root-reserve-mb: 512, swap-size-mb: 1024, remove-dotnet: 'true', remove-android: 'true', remove-haskell: 'true' }
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y subversion libncurses-dev gawk zlib1g-dev python3-dev python3-setuptools unzip wget libtool python3-pip jq ninja-build
      - name: Restore entire OpenWrt source from cache
        uses: actions/cache@v4
        with:
          path: openwrt
          key: src-v2-${{ matrix.openwrt_version }}-${{ hashFiles('cur_ver.json') }}
      - name: Install feeds and generate config
        working-directory: ./openwrt
        run: |
          ./scripts/feeds install -f -p passwall_packages
          ./scripts/feeds install -f -p passwall_luci
          ./scripts/feeds install -f -p passwall2
          ./scripts/feeds install -f -p luci
          TARGET_MAIN=$(echo "${{ matrix.target_subtarget }}" | cut -d' ' -f1)
          TARGET=$(echo "$TARGET_MAIN" | cut -d'/' -f1)
          SUBTARGET=$(echo "$TARGET_MAIN" | cut -d'/' -f2)
          cat > .config << EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_ALL_MODULES=y
          CONFIG_PACKAGE_luci=y
          CONFIG_SIGNED_PACKAGES=y
