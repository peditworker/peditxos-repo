      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: packages-part4-${{ matrix.openwrt_version }}-${{ matrix.target_subtarget }}
          path: dist
          retention-days: 1

  # Job 4: The final deployment job
  deploy:
    needs: [build_part1, build_part2, build_part3, build_part4]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download all built packages
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          pattern: packages-part*
          merge-multiple: true
      
      - name: Create repository index pages
        run: |
          cd dist
          # This script will generate an index.html for each directory, allowing for easy browsing.
          echo "Generating recursive index pages..."
          find . -type d -exec bash -c '
            cd "$0"
            echo "<!DOCTYPE html><html><head><title>Index of $(pwd)</title></head><body><h1>Index of $(pwd)</h1><hr><pre>" > index.html
            echo "<a href=\"../\">../</a>" >> index.html
            for item in *; do
              if [ -d "$item" ]; then
                echo "<a href=\"$item/\">$item/</a>" >> index.html
              else
                echo "<a href=\"$item\">$item</a>" >> index.html
              fi
            done
            echo "</pre><hr></body></html>"
          ' {} \;

          # Handle the root index page separately for a cleaner look
          echo '<!DOCTYPE html><html><head><title>PeDitXOS Repository</title><style>body{font-family: sans-serif; padding: 2em;}</style></head><body>' > index.html
          echo '<h1>PeDitXOS Repository</h1>' >> index.html
          echo '<h2>Available OpenWrt Versions:</h2><ul>' >> index.html
          for dir in $(find . -maxdepth 1 -type d -not -name '.*' -not -name '.' | sort); do
            version_name=$(basename "$dir")
            echo "<li><a href=\"$version_name/\">$version_name</a></li>" >> index.html
          done
          echo '</ul>' >> index.html
          find . -maxdepth 2 -name 'key-build-*.pub' -print -exec cp {} ./key-build.pub \; -quit
          if [ -f "./key-build.pub" ]; then
            echo '<h3>Public Signing Key: <a href="key-build.pub">key-build.pub</a></h3>' >> index.html
          fi
          echo '</body></html>'

      - name: Push updates to repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: peditx/PeDitXOS-Repository
          publish_dir: ./dist
          publish_branch: repo
          force_orphan: true
          cname: downloads.peditxos.ir
          user_name: 'peditworker'
          user_email: 'pedram.ale@me.com'

